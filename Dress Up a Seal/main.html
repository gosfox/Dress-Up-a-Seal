<!DOCTYPE html>

    <header>
        <img src="prplgradient.gif" alt="gradient" class="gradient">
        <img src="prplgradient.gif" alt="gradient" class="gradient">
        <img src="prplgradient.gif" alt="gradient" class="gradient">
        <img src="prplgradient.gif" alt="gradient" class="gradient">
        <img src="petseal.gif" alt="Pet seal" id="petseal">
        <h1>Dress Up a Seal</h1>
        <h2>Happy Kyuing</h2>

    <aside>

            <form id="formbaza">

                <label>Grey <input checked class="checked" type='radio' value='szara' name='bazaOpt' class='opt' onclick="baseSelect(1);"></label><br>

            </form>
        </div>
        <div>

                <label>Tie <input type='checkbox' value='krawat' name='akcesOpt' class='opt'></label><br>

                <label>Mask <input type='checkbox' value='maska' name='akcesOpt' class='opt'></label><br>
                <label>Sunflower <input type='checkbox' value='slonecznik' name='akcesOpt' class='opt'></label><br>
                <label>Wings <input type='checkbox' value='skrzydla' name='akcesOpt' class='opt'></label><br>
                <label>Demon tail <input type='checkbox' value='diabelogon' name='akcesOpt' class='opt'></label><br>
            </form>
        </div>
